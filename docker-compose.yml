services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamforge
      POSTGRES_PASSWORD: streamforge
      POSTGRES_DB: streamforge
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: .env
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://streamforge:streamforge@postgres:5432/streamforge?schema=public
      PORT: 8000
      REDIS_URL: redis://redis:6379
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    depends_on: [backend]
    environment:
      VITE_API_URL: http://192.168.58.158:8000
    ports: ["4173:4173"]

volumes:
  pg_data:
